  Storage-agnostic core for the cloud_sync family. Defines StorageAdapter,
  SyncEngine, SyncClient, ManifestDiffer, and conflict resolution — shared
  by every backend adapter.
version: 0.1.1
repository: https://github.com/arcanelabsio/cloud_sync
issue_tracker: https://github.com/arcanelabsio/cloud_sync/issues
topics:
  - sync
  - file-sync
  - storage
  - cloud

environment:
  sdk: ^3.6.0

dependencies:
  crypto: ^3.0.6
  path: ^1.9.1
  meta: ^1.16.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
