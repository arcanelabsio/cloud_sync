name: cloud_sync_core
description: >-
  Storage-agnostic core for the cloud_sync family. Defines the StorageAdapter
  interface, sync engine, manifest differ, conflict resolver, and SyncClient.
  No cloud provider logic lives here — implement StorageAdapter to add a backend.
version: 0.1.0
repository: https://github.com/arcanelabsio/cloud_sync
issue_tracker: https://github.com/arcanelabsio/cloud_sync/issues
topics:
  - sync
  - file-sync
  - storage
  - cloud

environment:
  sdk: ^3.6.0

dependencies:
  crypto: ^3.0.6
  path: ^1.9.1
  meta: ^1.16.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
