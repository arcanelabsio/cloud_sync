name: cloud_sync

packages:
  - packages/**

command:
  bootstrap:
    environment:
      sdk: ^3.6.0

scripts:
  analyze:
    description: Run dart analyze on all packages
    exec: dart analyze .

  test:
    description: Run dart test on all packages
    exec: dart test

  format:
    description: Check formatting on all packages
    exec: dart format --set-exit-if-changed .

  format_fix:
    description: Apply dart format to all packages
    exec: dart format .

  publish_dry:
    description: Dry-run publish for all packages
    exec: dart pub publish --dry-run

  tag:
    description: |
      Create and push a release tag for a single package.
      Usage: melos run tag -- <package>
      <package> is the short name (core, drive, s3, box) or full name.
      The publish.yaml workflow picks up the pushed tag and handles pub.dev.
    run: bash scripts/tag.sh
