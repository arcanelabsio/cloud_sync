name: Publish

# Triggered by per-package tags of the form `<package>-v<version>`,
# e.g. `cloud_sync_core-v0.1.0`, `cloud_sync_drive-v0.1.0`.
# Each tag publishes exactly one package — packages release independently.
on:
  push:
    tags:
      - 'cloud_sync_core-v*.*.*'
      - 'cloud_sync_drive-v*.*.*'
      - 'cloud_sync_s3-v*.*.*'
      - 'cloud_sync_box-v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `id-token: write` is required for pub.dev OIDC trusted publishing.
      # Harmless if static credentials are used instead.
      id-token: write
      # `contents: write` is required so the final step can create a GitHub
      # Release for the tag — the tag itself is pushed by scripts/tag.sh, but
      # without the Release record the repo's Releases page shows bare tags
      # with no link to pub.dev.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Parse tag → package + version
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          PACKAGE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${PACKAGE} @ ${VERSION}"

      - name: Verify pubspec.yaml version matches tag
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: |
          PUBSPEC_VERSION=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          if [ "${PUBSPEC_VERSION}" != "${{ steps.parse.outputs.version }}" ]; then
            echo "::error::Tag version '${{ steps.parse.outputs.version }}' does not match pubspec.yaml version '${PUBSPEC_VERSION}' in ${{ steps.parse.outputs.package }}"
            exit 1
          fi

      - name: Activate melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Analyze entire workspace (regression check)
        run: melos run analyze

      - name: Test entire workspace (regression check)
        run: melos run test

      - name: Dry-run publish (surface any pub.dev validation errors early)
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: dart pub publish --dry-run

      # OIDC trusted publishing is configured per-package on pub.dev
      # (Admin → Automated publishing → repo arcanelabsio/cloud_sync,
      #  tag pattern <package>-v{{version}}). The dart-lang/setup-dart
      # action + `id-token: write` permission above are what let
      # `dart pub publish` pick up the short-lived OIDC token from the
      # GitHub Actions runtime. No secrets to manage.
      - name: Publish to pub.dev
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: dart pub publish --force

      # The Releases page is a reader's entry point — bare tags without a
      # Release body hide the fact that a tag shipped code to pub.dev.
      # Create a Release record that links back to the pub.dev version page
      # and to the package's CHANGELOG for humans scanning history.
      - name: Extract CHANGELOG entry for this version
        id: changelog
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          # Grab the lines from `## <version>` (or `## [<version>]`) down to the next `## ` heading.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[?"v"\\]?([[:space:]]|$)" { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > /tmp/release-notes.md || true
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG entry found for ${VERSION}; falling back to generic notes." >&2
            echo "_No CHANGELOG entry found for this version._" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release for tag
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ steps.parse.outputs.package }}
          VERSION: ${{ steps.parse.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          PUB_URL="https://pub.dev/packages/${PACKAGE}/versions/${VERSION}"
          CHANGELOG_URL="https://github.com/${{ github.repository }}/blob/main/packages/${PACKAGE}/CHANGELOG.md"
          {
            echo "**Published to pub.dev:** [${PACKAGE} ${VERSION}](${PUB_URL})"
            echo ""
            echo "**Install**"
            echo ""
            echo '```yaml'
            echo "dependencies:"
            echo "  ${PACKAGE}: ^${VERSION}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            cat /tmp/release-notes.md
            echo ""
            echo "---"
            echo ""
            echo "- Full CHANGELOG: [${PACKAGE}/CHANGELOG.md](${CHANGELOG_URL})"
            echo "- Package README: [${PACKAGE}](https://pub.dev/packages/${PACKAGE})"
          } > /tmp/release-body.md

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "${PACKAGE} ${VERSION}" \
            --notes-file /tmp/release-body.md \
            --verify-tag
